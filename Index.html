<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Intelligence Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --surface2: #1a2235;
      --border:   #1e2d45;
      --accent:   #00d4aa;
      --accent2:  #3b82f6;
      --red:      #f43f5e;
      --green:    #10b981;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'DM Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    aside {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 2px;
      padding: 0 20px 12px;
      text-transform: uppercase;
    }
    .company-btn {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 12px 20px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      border-left: 3px solid transparent;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .company-btn:hover { color: var(--text); background: var(--surface2); }
    .company-btn.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--surface2);
    }
    .company-btn .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .company-btn.active .dot { background: var(--accent); }

    /* ── Main Content ──────────────────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .stock-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .stock-title span { color: var(--accent); }
    .filters { display: flex; gap: 8px; }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ── Stat cards ──────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.blue  { color: var(--accent2); }
    .stat-value.accent{ color: var(--accent); }

    /* ── Chart card ──────────────────────────────────────────── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
    }
    .chart-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: var(--mono);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .chart-wrap { position: relative; height: 260px; }

    /* ── Compare section ─────────────────────────────────────── */
    .compare-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .compare-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .compare-btn {
      background: var(--accent2);
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .compare-btn:hover { opacity: 0.85; }

    /* ── Gainers / Losers ─────────────────────────────────────── */
    .gl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .gl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .gl-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .gl-title.g { color: var(--green); }
    .gl-title.r { color: var(--red); }
    .gl-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }
    .gl-row:last-child { border-bottom: none; }
    .gl-pct { font-family: var(--mono); font-size: 13px; }
    .gl-pct.pos { color: var(--green); }
    .gl-pct.neg { color: var(--red); }

    /* ── Loading / Empty states ──────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 1px;
    }
    .pulse::after {
      content: '...';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      aside { width: 100%; min-width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; border-right: none; border-bottom: 1px solid var(--border); }
      .gl-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Stock<span>IQ</span></div>
  <div class="header-tag">NSE · Real-time · 8 stocks</div>
</header>

<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <aside>
    <div class="sidebar-title">Companies</div>
    <div id="company-list">
      <div class="loading"><span class="pulse">Loading</span></div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="stock-title" id="stock-title">Select a <span>stock</span></div>
      <div class="filters">
        <button class="filter-btn active" onclick="setDays(30,this)">30D</button>
        <button class="filter-btn" onclick="setDays(60,this)">60D</button>
        <button class="filter-btn" onclick="setDays(90,this)">90D</button>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid" id="stat-grid">
      <div class="stat-card"><div class="stat-label">52W High</div><div class="stat-value accent" id="s-high">—</div></div>
      <div class="stat-card"><div class="stat-label">52W Low</div><div class="stat-value blue" id="s-low">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg Close</div><div class="stat-value" id="s-avg">—</div></div>
      <div class="stat-card"><div class="stat-label">Volatility</div><div class="stat-value" id="s-vol">—</div></div>
      <div class="stat-card"><div class="stat-label">Momentum</div><div class="stat-value" id="s-mom">—</div></div>
    </div>

    <!-- Close price chart -->
    <div class="chart-card">
      <h3>Closing Price</h3>
      <div class="chart-wrap"><canvas id="closeChart"></canvas></div>
    </div>

    <!-- Daily return chart -->
    <div class="chart-card">
      <h3>Daily Return (%)</h3>
      <div class="chart-wrap"><canvas id="returnChart"></canvas></div>
    </div>

    <!-- Compare section -->
    <div class="chart-card">
      <h3>Compare Two Stocks</h3>
      <div class="compare-row" style="margin-bottom:16px">
        <select id="cmp1"></select>
        <span style="color:var(--muted);font-weight:700">vs</span>
        <select id="cmp2"></select>
        <button class="compare-btn" onclick="loadCompare()">Compare</button>
      </div>
      <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
    </div>

    <!-- Gainers / Losers -->
    <div class="gl-grid">
      <div class="gl-card">
        <div class="gl-title g">▲ Top Gainers</div>
        <div id="gainers-list"><div class="loading" style="height:80px"><span class="pulse">Loading</span></div></div>
      </div>
      <div class="gl-card">
        <div class="gl-title r">▼ Top Losers</div>
        <div id="losers-list"><div class="loading" style="height:80px"><span class="pulse">Loading</span></div></div>
      </div>
    </div>

  </main>
</div>

<script>
const API = 'http://127.0.0.1:8000';   // change if deployed elsewhere
let currentSymbol = null;
let currentDays   = 30;
let closeChartObj = null;
let returnChartObj= null;
let compareChartObj = null;
let allCompanies  = [];

const chartDefaults = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { ticks: { color: '#64748b', font:{family:'DM Mono',size:10} }, grid:{color:'#1e2d45'} },
    y: { ticks: { color: '#64748b', font:{family:'DM Mono',size:10} }, grid:{color:'#1e2d45'} }
  }
};

// ── Load company list ───────────────────────────────────────────────────────
async function loadCompanies() {
  const res  = await fetch(`${API}/companies`);
  const data = await res.json();
  allCompanies = data.companies;

  const list = document.getElementById('company-list');
  list.innerHTML = '';
  allCompanies.forEach(sym => {
    const btn = document.createElement('button');
    btn.className = 'company-btn';
    btn.innerHTML = `<span class="dot"></span>${sym}`;
    btn.onclick = () => selectCompany(sym, btn);
    list.appendChild(btn);
  });

  // Populate compare dropdowns
  ['cmp1','cmp2'].forEach((id, i) => {
    const sel = document.getElementById(id);
    allCompanies.forEach((s, j) => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      if (j === i) opt.selected = true;  // pre-select different defaults
      sel.appendChild(opt);
    });
  });

  // Auto-select first stock
  if (allCompanies.length > 0) {
    selectCompany(allCompanies[0], list.firstChild);
  }

  loadGainersLosers();
}

// ── Select a company ────────────────────────────────────────────────────────
function selectCompany(symbol, btn) {
  document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSymbol = symbol;
  document.getElementById('stock-title').innerHTML =
    `<span>${symbol}</span> — Last ${currentDays} days`;
  loadStockData(symbol);
  loadSummary(symbol);
}

// ── Set day filter ──────────────────────────────────────────────────────────
function setDays(days, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentDays = days;
  if (currentSymbol) {
    document.getElementById('stock-title').innerHTML =
      `<span>${currentSymbol}</span> — Last ${days} days`;
    loadStockData(currentSymbol);
  }
}

// ── Load stock data and draw charts ────────────────────────────────────────
async function loadStockData(symbol) {
  const res  = await fetch(`${API}/data/${symbol}`);
  const json = await res.json();
  let data   = json.data.slice(-currentDays);  // apply day filter client-side

  const labels  = data.map(d => d.date.slice(5));  // show MM-DD
  const closes  = data.map(d => d.close);
  const returns = data.map(d => d.daily_return);
  const ma7     = data.map(d => d.ma_7 || null);

  // ── Close Price Chart ──────────────────────────────────────────────────
  if (closeChartObj) closeChartObj.destroy();
  closeChartObj = new Chart(document.getElementById('closeChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Close', data: closes,
          borderColor: '#00d4aa', borderWidth: 2,
          pointRadius: 0, fill: true,
          backgroundColor: 'rgba(0,212,170,0.08)',
          tension: 0.3,
        },
        {
          label: '7-day MA', data: ma7,
          borderColor: '#3b82f6', borderWidth: 1.5,
          pointRadius: 0, fill: false,
          borderDash: [4,4], tension: 0.3,
        }
      ]
    },
    options: { ...chartDefaults, plugins: { legend: {
      display: true,
      labels: { color:'#64748b', font:{family:'DM Mono',size:11} }
    }}}
  });

  // ── Daily Return Chart ─────────────────────────────────────────────────
  if (returnChartObj) returnChartObj.destroy();
  returnChartObj = new Chart(document.getElementById('returnChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Daily Return %',
        data: returns,
        backgroundColor: returns.map(r => r >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(244,63,94,0.7)'),
        borderRadius: 3,
      }]
    },
    options: chartDefaults,
  });
}

// ── Load summary stats ──────────────────────────────────────────────────────
async function loadSummary(symbol) {
  const res  = await fetch(`${API}/summary/${symbol}`);
  const data = await res.json();

  document.getElementById('s-high').textContent = '₹' + data.high_52w;
  document.getElementById('s-low').textContent  = '₹' + data.low_52w;
  document.getElementById('s-avg').textContent  = '₹' + data.avg_close;

  const volEl = document.getElementById('s-vol');
  volEl.textContent = data.max_volatility ?? '—';
  volEl.className   = 'stat-value ' + (data.max_volatility > 2 ? 'red' : 'green');

  const momEl = document.getElementById('s-mom');
  momEl.textContent = (data.avg_momentum > 0 ? '+' : '') + data.avg_momentum + '%';
  momEl.className   = 'stat-value ' + (data.avg_momentum >= 0 ? 'green' : 'red');
}

// ── Compare two stocks ──────────────────────────────────────────────────────
async function loadCompare() {
  const s1 = document.getElementById('cmp1').value;
  const s2 = document.getElementById('cmp2').value;

  if (s1 === s2) { alert('Please pick two different stocks.'); return; }

  const res  = await fetch(`${API}/compare?symbol1=${s1}&symbol2=${s2}`);
  const json = await res.json();

  const d1 = json.comparison[s1];
  const d2 = json.comparison[s2];

  const labels = d1.map(d => d.date.slice(5));

  if (compareChartObj) compareChartObj.destroy();
  compareChartObj = new Chart(document.getElementById('compareChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: s1, data: d1.map(d => d.close),
          borderColor: '#00d4aa', borderWidth: 2,
          pointRadius: 0, fill: false, tension: 0.3,
        },
        {
          label: s2, data: d2.map(d => d.close),
          borderColor: '#f43f5e', borderWidth: 2,
          pointRadius: 0, fill: false, tension: 0.3,
        }
      ]
    },
    options: { ...chartDefaults, plugins: { legend: {
      display: true,
      labels: { color:'#64748b', font:{family:'DM Mono',size:11} }
    }}}
  });
}

// ── Gainers & Losers ────────────────────────────────────────────────────────
async function loadGainersLosers() {
  const res  = await fetch(`${API}/gainers-losers`);
  const data = await res.json();

  const renderRows = (items) => items.map(item => `
    <div class="gl-row">
      <span>${item.symbol}</span>
      <span class="gl-pct ${item.daily_return >= 0 ? 'pos' : 'neg'}">
        ${item.daily_return >= 0 ? '+' : ''}${item.daily_return}%
      </span>
    </div>
  `).join('');

  document.getElementById('gainers-list').innerHTML = renderRows(data.gainers);
  document.getElementById('losers-list').innerHTML  = renderRows(data.losers);
}

// ── Init ────────────────────────────────────────────────────────────────────
loadCompanies();
</script>
</body>
</html>
